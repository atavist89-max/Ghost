name: Build Ghost APK

on:
  push:
    branches: [ main, develop, feature/pip-cyberpunk-ui, feature/tavily-web-search ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install NDK
      run: |
        sdkmanager "ndk;27.0.12077973"
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
        
    - name: Grant execute permission for gradlew
      working-directory: ./ghost
      run: chmod +x gradlew
      
    - name: Build Release APK
      working-directory: ./ghost
      run: ./gradlew assembleRelease
      
    - name: Sign APK with debug key
      working-directory: ./ghost
      run: |
        # Generate debug keystore if not exists
        if [ ! -f debug.keystore ]; then
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi
        
        # Sign the APK
        ${ANDROID_HOME}/build-tools/35.0.0/apksigner sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android --in app/build/outputs/apk/release/app-release-unsigned.apk --out app/build/outputs/apk/release/app-release-signed.apk
        
        # Verify signature
        ${ANDROID_HOME}/build-tools/35.0.0/apksigner verify app/build/outputs/apk/release/app-release-signed.apk
        echo "✓ APK signed successfully"
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ghost-pip-ui-apk
        path: ghost/app/build/outputs/apk/release/app-release-signed.apk
        retention-days: 7
        
    - name: Verify APK permissions
      run: |
        echo "Checking APK permissions..."
        sudo apt-get update && sudo apt-get install -y aapt
        aapt dump permissions ghost/app/build/outputs/apk/release/app-release-signed.apk | grep -i internet && echo "✓ INTERNET permission found (required for optional Tavily web search)" || exit 1
        
    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Ghost v1.0.${{ github.run_number }}
        files: ghost/app/build/outputs/apk/release/app-release-signed.apk
        draft: true
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
